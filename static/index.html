<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KikkerX</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#103a1c" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div class="page">
      <h1><img src="/logo.svg" class="logo" alt="" />KikkerX</h1>

      <div class="links">
        <a href="/photo">Photo</a>
        <a href="/video">Video</a>
      </div>
      <a href="/hub" class="page-link">Cameras Hub</a>

      <div class="section-hd">
        <h2>Status</h2>
        <button type="button" id="refreshBtn" class="icon-btn" style="margin-bottom: 12px" title="Refresh">↻</button>
      </div>
      <div class="status-info">
        <span class="sl">Board:</span><span id="statusBoard">…</span>
        <span class="sl">Device ID:</span><span id="statusId">…</span>
        <span class="sl">Version:</span><span id="statusVer"><span id="statusVerText">…</span> <a href="/ota"
            id="otaLink" class="ota-inline-link">update</a></span>
        <div id="batteryRow" style="display:contents">
          <span class="sl">Battery:</span><span id="statusBat">…</span>
        </div>
        <span class="sl">WiFi:</span><span id="statusWifi">…</span>
      </div>

      <a href="/logs" class="page-link">Logs</a>
      <a href="/config" class="page-link">Configuration</a>

      <div id="ledSection">
        <h2>LED</h2>
        <div class="led-row">
          <button type="button" id="ledBtn" class="led-btn" title="Toggle the LED state on the device">
            <div style="margin-bottom: 3px">●</div>
          </button>
          <button type="button" id="blinkBtn" class="blink-btn" title="Blink the LED on the device">★ Blink</button>
        </div>
      </div>

      <h2>Power</h2>
      <div class="btn-row">
        <button type="button" id="reconnectBtn" class="restart-btn"
          title="Disconnect from WiFi and reconnect">Reconnect</button>
        <button type="button" id="restartBtn" class="restart-btn" title="Restart the device">Restart</button>
      </div>
      <div class="btn-row">
        <input type="number" id="durVal" class="dur-val" min="1" max="255" value="30" />
        <select id="durUnit">
          <option value="m">minutes</option>
          <option value="h">hours</option>
          <option value="permanent">permanent</option>
        </select>
        <button type="button" id="poweroffBtn" class="off-btn"
          title="Power off the device and power on again after the specified time">Power off</button>
      </div>
      <div id="msg"></div>
    </div>

    <script type="module" src="/index.mjs"></script>
  </body>
</html>
