; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


; Base configuration for KikkerX — board-independent settings.
[kikker-x]
platform = espressif32
framework = arduino

lib_deps =
    alexiii/incbin

build_unflags = -ggdb
build_flags =
    -fmacro-prefix-map=${PROJECT_DIR}/=
    -fmacro-prefix-map=${PROJECT_DIR}\\=
    -g1  ; minimal line/info, keeps stacktraces usable
build_src_filter = +<*> -<boards/*>

extra_scripts =
    pre:build_helpers/generate_version.py
    pre:build_helpers/embed_static.py
    pre:build_helpers/prepare_config.py
    post:build_helpers/strip_paths.py

; Force run from partition app0, where the firmware is flashed.
board_build.flash_extra_images =
    0xe000 ${platformio.packages_dir}/framework-arduinoespressif32/tools/partitions/boot_app0.bin

upload_speed = 115200
upload_flags =
    --before=default_reset
    --after=hard_reset
monitor_speed = 115200


; Config templates:

; M5Stack Timer Camera X
[kikker-x-timercam]
extends = kikker-x
board = m5stack-timer-cam
build_src_filter = ${kikker-x.build_src_filter} +<boards/timercam_board.cpp>


; ESP-WROVER-DEV / ESP-WROVER-KIT (all versions) with OV3660
[kikker-x-wrovercam]
extends = kikker-x
board = esp32dev
build_flags =
    ${kikker-x.build_flags}
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
build_src_filter = ${kikker-x.build_src_filter} +<boards/wrover_board.cpp>


; Default builds — no config embedded. Uses config previously stored on the device,
; otherwise falls back to firmware defaults (AP mode with random password).
; Build once, push to all cameras of the same board type via OTA.
; See configs/README.md for the config policy system, and configs/platformio.ini.template
; for how to define custom configs.

[env:kikker-x-timercam-default]
extends = kikker-x-timercam
custom_config_policy = LOAD_OR_USE_DEFAULT

[env:kikker-x-wrovercam-default]
extends = kikker-x-wrovercam
custom_config_policy = LOAD_OR_USE_DEFAULT


[platformio]
; The gitignored configs/platformio.ini can define custom configurations with per-camera
; settings. See configs/platformio.ini.template for more information.
extra_configs = configs/platformio.ini
