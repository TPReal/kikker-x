; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


; Base configuration for KikkerX — board-independent settings.
[kikker-x]
platform = espressif32
framework = arduino

upload_speed = 115200
upload_flags =
    --before=default_reset
    --after=hard_reset
monitor_speed = 115200

lib_deps =
    alexiii/incbin
extra_scripts =
    pre:build_helpers/generate_version.py
    pre:build_helpers/embed_static.py
    pre:build_helpers/prepare_config.py
build_src_filter = +<*> -<boards/*>


; M5Stack Timer Camera X
[kikker-x-timercam]
extends = kikker-x
board = m5stack-timer-cam
lib_deps =
    ${kikker-x.lib_deps}
    arduino-libraries/ArduinoHttpClient
    m5stack/Timer-CAM
build_src_filter = ${kikker-x.build_src_filter} +<boards/timercam_board.cpp>


; ESP-WROVER-DEV / ESP-WROVER-KIT (all versions) with OV3660
[kikker-x-wrovercam]
extends = kikker-x
board = esp32dev
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
build_src_filter = ${kikker-x.build_src_filter} +<boards/wrover_board.cpp>


; Build with the default parameters.
[env:kikker-x-timercam-default]
extends = kikker-x-timercam
; The JSON file (or files) that are used as the config for the camera. If multiple files are
; provided, they are shallow merged (only top-level fields) with the later files taking
; precedence over the earlier ones. This allows to have e.g. a common config for WiFi credentials
; and separate configs for other settings.
custom_config_files = configs/default_config.json


; Build with the default parameters.
[env:kikker-x-wrovercam-default]
extends = kikker-x-wrovercam
; The JSON file (or files) that are used as the config for the camera. If multiple files are
; provided, they are shallow merged (only top-level fields) with the later files taking
; precedence over the earlier ones. This allows to have e.g. a common config for WiFi credentials
; and separate configs for other settings.
custom_config_files = configs/default_config.json

[platformio]
; The gitignored configs/platformio.ini can define custom configurations, similar to the
; [env:kikker-x-default] above. See configs/platformio.ini.template for more information.
extra_configs = configs/platformio.ini
