<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KikkerX — Logs</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#103a1c" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/logs.css" />
  </head>
  <body>
    <div class="page">
      <div class="top-bar">
        <h1><a href="/" style="color: #fff; text-decoration: none">⇦</a> Logs</h1>
        <span id="status">Loading…</span>
        <button
          type="button"
          id="refresh-btn"
          style="
            margin-left: auto;
            background: none;
            border: 1px solid #333;
            color: #777;
            padding: 2px 10px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 3px;
          "
        >
          Refresh
        </button>
      </div>
      <div id="log"></div>
    </div>
    <script type="module" src="/logs.mjs"></script>
  </body>
</html>
