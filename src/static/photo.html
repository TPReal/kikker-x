<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KikkerX — Photo</title>
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#103a1c" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/settings.css" />
  </head>
  <body>
    <div id="mainLayout">
      <div id="canvasArea">
        <div class="bar">
          <span class="nav-title"><a href="/">⇦</a> Photo</span>
          <div class="bar-center">
            <select id="res">
              <option value="QQVGA">160×120 (QQVGA)</option>
              <option value="QVGA">320×240 (QVGA)</option>
              <option value="CIF">400×296 (CIF)</option>
              <option value="VGA">640×480 (VGA)</option>
              <option value="SVGA">800×600 (SVGA)</option>
              <option value="XGA">1024×768 (XGA)</option>
              <option value="SXGA">1280×1024 (SXGA)</option>
              <option value="UXGA" selected>1600×1200 (UXGA)</option>
            </select>
            <button type="button" id="resReset" class="icon-btn">↺</button>
            <label id="status">Ready</label>
          </div>
          <div class="bar-center">
            <button type="button" id="refreshBtn">↻ Refresh</button>
            <button type="button" id="fsBtn" title="Fullscreen">⛶</button>
          </div>
        </div>
        <div id="canvasWrap">
          <canvas id="canvas"></canvas>
        </div>
      </div>
      <div id="settingsArea">
        <div id="settingsContainer"></div>
      </div>
    </div>

    <script type="module" src="/photo.mjs"></script>
  </body>
</html>
